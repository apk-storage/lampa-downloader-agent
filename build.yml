name: build-agent

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod tidy

      - name: Determine version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "v=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "is_tag=true"        >> "$GITHUB_OUTPUT"
          else
            echo "v=nightly-$(date +%Y%m%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows (native webview, CGO)
        env: { GOOS: windows, GOARCH: amd64, CGO_ENABLED: '1' }
        run: |
          go build -ldflags "-H=windowsgui -X main.version=${{ steps.ver.outputs.v }}" -o lampa-agent.exe .
          go build -ldflags "-X main.version=${{ steps.ver.outputs.v }}" -o lampa-agent-console.exe .

      - name: Build macOS + Linux (cross, no CGO)
        env: { LDF: "-X main.version=${{ steps.ver.outputs.v }}" }
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDF" -o lampa-agent-macos-intel .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDF" -o lampa-agent-macos-arm .
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "$LDF" -o lampa-agent-linux .

      - name: Checksums
        run: sha256sum lampa-agent.exe lampa-agent-console.exe lampa-agent-macos-intel lampa-agent-macos-arm lampa-agent-linux > SHA256SUMS.txt

      # Release for version tags (creates or updates, attaches binaries)
      - name: Release (tag)
        if: steps.ver.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            lampa-agent.exe
            lampa-agent-console.exe
            lampa-agent-macos-intel
            lampa-agent-macos-arm
            lampa-agent-linux
            SHA256SUMS.txt

      # Rolling "nightly" prerelease for main pushes
      - name: Release (nightly)
        if: steps.ver.outputs.is_tag == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly — последняя сборка
          prerelease: true
          body: "Автоматическая сборка из main. Стабильные версии — в релизах с тегом vX.Y.Z."
          files: |
            lampa-agent.exe
            lampa-agent-console.exe
            lampa-agent-macos-intel
            lampa-agent-macos-arm
            lampa-agent-linux
            SHA256SUMS.txt

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

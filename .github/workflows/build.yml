name: build-agent

on:
  push:
    paths:
      - '**.go'
      - 'go.mod'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Resolve dependencies
        run: go mod tidy

      - name: Build Windows (native webview, CGO)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
        run: |
          go build -ldflags "-H=windowsgui" -o lampa-agent.exe .
          go build -o lampa-agent-console.exe .

      - name: Build macOS + Linux (cross, no CGO)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o lampa-agent-macos-intel .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o lampa-agent-macos-arm .
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -o lampa-agent-linux .

      - name: Publish "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest \
            --title "Lampa Downloader agent" \
            --notes "Автосборка. Windows: lampa-agent.exe (фоновый, нативное окно) или lampa-agent-console.exe (с логами)." \
            lampa-agent.exe lampa-agent-console.exe \
            lampa-agent-macos-intel lampa-agent-macos-arm lampa-agent-linux

      - name: Upload artifacts (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: lampa-agent-exe
          path: |
            lampa-agent.exe
            lampa-agent-console.exe

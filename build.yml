name: build-agent

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ---- desktop binaries + releases ----
  binaries:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужно для changelog (--generate-notes)

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go mod tidy

      - name: Determine version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "v=$GITHUB_REF_NAME"  >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "pre=false"            >> "$GITHUB_OUTPUT"
          else
            echo "v=nightly-$(date +%Y%m%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "pre=true"    >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows (native webview, CGO)
        env: { GOOS: windows, GOARCH: amd64, CGO_ENABLED: '1' }
        run: |
          go build -ldflags "-H=windowsgui -X main.version=${{ steps.ver.outputs.v }}" -o lampa-agent.exe .
          go build -ldflags "-X main.version=${{ steps.ver.outputs.v }}" -o lampa-agent-console.exe .

      - name: Build macOS + Linux (cross, no CGO)
        env: { LDF: "-X main.version=${{ steps.ver.outputs.v }}" }
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDF" -o lampa-agent-macos-intel .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDF" -o lampa-agent-macos-arm .
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "$LDF" -o lampa-agent-linux .

      - name: Checksums
        run: sha256sum lampa-agent.exe lampa-agent-console.exe lampa-agent-macos-intel lampa-agent-macos-arm lampa-agent-linux > SHA256SUMS.txt

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES="lampa-agent.exe lampa-agent-console.exe lampa-agent-macos-intel lampa-agent-macos-arm lampa-agent-linux SHA256SUMS.txt"
          if [ "${{ steps.ver.outputs.pre }}" = "true" ]; then
            gh release delete nightly --cleanup-tag --yes || true
            gh release create nightly --prerelease \
              --title "Nightly — последняя сборка" \
              --notes "Автоматическая сборка из main. Для стабильной версии смотрите релизы с тегом vX.Y.Z." \
              $FILES
          else
            gh release create "${{ steps.ver.outputs.tag }}" \
              --title "${{ steps.ver.outputs.tag }}" \
              --generate-notes \
              $FILES
          fi

  # ---- Docker image -> GitHub Container Registry ----
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

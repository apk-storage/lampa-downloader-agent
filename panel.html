<style>
:root{--bg:#1b1b1b;--card:#242424;--soft:#2e2e2e;--line:#333;--text:#f2f2f2;--muted:#8f8f8f;--ok:#5aa15a;--fill:#e8e8e8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:14px 18px;max-width:640px;margin:0 auto}
.top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.top h1{font-size:18px;font-weight:600;margin:0}
.dot{width:9px;height:9px;border-radius:50%;background:#666}
.dot.on{background:var(--ok)}
.muted{color:var(--muted)}
.card{background:var(--card);border:.5px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:10px}
.label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.code{display:flex;gap:6px}
.code span{font-family:ui-monospace,Consolas,monospace;font-size:22px;font-weight:600;background:var(--soft);border-radius:8px;padding:4px 10px;letter-spacing:.05em}
#devs{max-height:110px;overflow:auto}
#jobs{max-height:190px;overflow:auto}
#hist{max-height:140px;overflow:auto}
details.card summary{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;cursor:pointer;user-select:none;list-style:none}
details.card summary::-webkit-details-marker{display:none}
details.card summary:after{content:"▸";float:right;color:var(--muted)}
details.card[open] summary:after{content:"▾"}
.gear{padding:8px 10px;font-size:15px;line-height:1}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--card);border:.5px solid var(--line);border-radius:14px;padding:18px 20px;width:min(440px,92vw)}
.modal h2{font-size:14px;margin:0 0 10px;font-weight:600}
.modal .foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.dir{display:flex;align-items:center;gap:10px;margin-top:6px}
.dir .path{font-family:ui-monospace,Consolas,monospace;font-size:13px;flex:1;min-width:0;background:var(--soft);color:var(--text);padding:8px 10px;border-radius:8px;border:.5px solid var(--line);outline:none}
button{background:var(--soft);color:var(--text);border:.5px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
button:hover{background:#383838}
.dl{margin:9px 0}
.dl-name{font-size:14px;margin-bottom:5px}
.bar{height:8px;border-radius:4px;background:var(--soft);overflow:hidden}
.fill{height:100%;background:var(--fill);border-radius:4px;transition:width .4s}
.meta{font-size:12px;color:var(--muted);margin-top:5px}
.empty{color:var(--muted);font-size:14px;padding:6px 0}
.jb{padding:2px 8px;font-size:12px;margin-left:6px}
.dirmsg{font-size:12px;margin-top:8px;min-height:16px;opacity:0;transition:opacity .2s}
.dirmsg.show{opacity:1}
.dirmsg.ok{color:#5aa15a}
.dirmsg.err{color:#e05a5a}
.sw{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;cursor:pointer}
.sw input{width:16px;height:16px;accent-color:#2b7cff;cursor:pointer}
#browser{display:none;margin-top:12px;border-top:.5px solid var(--line);padding-top:12px}
.br-top{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.br-path{flex:1;min-width:0;font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-choose{background:#2b7cff!important;border-color:#2b7cff!important;color:#fff!important}
#brList{max-height:240px;overflow:auto;border:.5px solid var(--line);border-radius:8px}
.br-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:.5px solid rgba(255,255,255,.05)}
.br-item:hover{background:var(--soft)}
.br-item:last-child{border-bottom:none}
.br-ic{opacity:.7}
</style></head><body>
<div class="top"><span class="dot" id="dot"></span><h1>Lampa Downloader</h1><span class="muted" id="relay" style="margin-left:auto;font-size:13px"></span><button class="gear" onclick="settingsOpen()" title="Настройки" style="margin-left:14px">⚙</button><button onclick="quit()">Выход</button></div>

<div class="card">
  <div class="label">Код для Лампы <span class="muted" style="text-transform:none;letter-spacing:0;float:right">Лампа → Настройки → Lampa Downloader</span></div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div class="code" id="code"></div>
    <button id="pairBtn" onclick="openPair()" style="margin-left:auto">Разрешить подключение</button>
  </div>
  <div class="meta" id="pairState" style="min-height:15px"></div>
</div>

<div class="card">
  <div class="label">Папка загрузок</div>
  <div class="dir"><input class="path" id="dir" spellcheck="false" placeholder="Путь к папке загрузок"><button onclick="brOpen()">Обзор</button><button onclick="openDir()">Открыть</button></div>
  <div id="dirmsg" class="dirmsg"></div>
  <div id="browser">
    <div class="br-top"><button onclick="brUp()" id="brUpBtn">⬆</button><div class="br-path" id="brPath"></div><button class="br-choose" onclick="brChoose()">Выбрать эту папку</button><button onclick="brClose()">✕</button></div>
    <div id="brList"></div>
  </div>
</div>

<div class="overlay" id="settings" onclick="if(event.target===this)settingsClose()">
  <div class="modal">
    <h2>Настройки</h2>
    <label class="sw"><input type="checkbox" id="st_seed"><span>Раздавать после скачивания</span></label>
    <label class="sw"><input type="checkbox" id="st_auto"><span>Запускать вместе с системой</span></label>
    <label class="sw"><input type="checkbox" id="st_part"><span>Оставлять недокачанные файлы при отмене</span></label>
    <div class="foot">
      <button onclick="resetKey()" style="font-size:12px;color:#e05a5a">Сбросить ключ и код…</button>
      <button onclick="settingsClose()">Закрыть</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="label">Подключённые ТВ</div>
  <div id="devs"><div class="empty">Пока никто не подключён</div></div>
</div>

<div class="card">
  <div class="label">Загрузки</div>
  <div id="jobs"><div class="empty">Пока пусто</div></div>
</div>

<details class="card" id="histCard">
  <summary>История <span id="histN" class="muted" style="text-transform:none"></span></summary>
  <div id="hist" style="margin-top:8px"><div class="empty">Завершённых загрузок пока нет</div></div>
  <div style="margin-top:8px;text-align:right"><button onclick="clearHist()" class="jb">Очистить</button></div>
</details>

<script>
function post(u){return fetch(u,{method:'POST'})}
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML}
function stateRu(s){return s==='done'?'готово':s==='seeding'?'раздаётся':s==='connecting'?'подключение':s==='paused'?'пауза':s==='error'?'ошибка':'скачивание'}
function fmtSpeed(b){if(!b)return '';if(b>1048576)return (b/1048576).toFixed(1)+' МБ/с';if(b>1024)return Math.round(b/1024)+' КБ/с';return b+' Б/с'}
function fmtEta(s){if(s==null||s<0)return '';if(s<60)return s+' сек';if(s<3600)return Math.round(s/60)+' мин';var h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h+' ч '+m+' мин'}
function pauseJob(id){post('/api/pause?id='+encodeURIComponent(id)).then(tick)}
function resumeJob(id){post('/api/resume?id='+encodeURIComponent(id)).then(tick)}
function copyDiag(){fetch('/api/diag').then(r=>r.text()).then(function(t){navigator.clipboard.writeText(t).then(function(){alert('Диагностика скопирована в буфер обмена')},function(){prompt('Скопируйте диагностику:',t)})})}
function openDir(){post('/api/opendir')}
var dirSaved='';
function dirMsg(text,ok){
  var m=document.getElementById('dirmsg');
  m.textContent=text; m.className='dirmsg show '+(ok?'ok':'err');
  clearTimeout(m._t); m._t=setTimeout(function(){m.className='dirmsg'},2500);
}
function saveDir(){
  var el=document.getElementById('dir'), v=el.value.trim();
  if(!v || v===dirSaved) return;
  post('/api/setdir?dir='+encodeURIComponent(v)).then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d}})})
   .then(function(res){
      if(res.ok && res.d && res.d.dir){ el.value=res.d.dir; dirSaved=res.d.dir; dirMsg('Папка сохранена',true); }
      else { dirMsg((res.d&&res.d.error)||'Не удалось сохранить папку',false); }
   })
   .catch(function(){ dirMsg('Не удалось сохранить папку',false) });
}
var brState={path:'',parent:'',up:false},brDirs=[];
function brOpen(){var cur=document.getElementById('dir').value||'';document.getElementById('browser').style.display='block';brGo(cur)}
function brClose(){document.getElementById('browser').style.display='none'}
function brUp(){if(brState.up)brGo(brState.parent)}
function brChoose(){if(!brState.path)return;post('/api/setdir?dir='+encodeURIComponent(brState.path)).then(r=>r.json()).then(function(d){if(d&&d.dir){document.getElementById('dir').value=d.dir;dirSaved=d.dir;dirMsg('Папка сохранена',true);}brClose()}).catch(function(){dirMsg('Не удалось сохранить папку',false);brClose()})}
function brGo(path){
  fetch('/api/browse?path='+encodeURIComponent(path||'')).then(r=>r.json()).then(function(d){
    brState={path:d.path||'',parent:d.parent||'',up:!!d.up};
    brDirs=d.dirs||[];
    document.getElementById('brPath').textContent=d.path||'Компьютер';
    document.getElementById('brUpBtn').style.visibility=d.up?'visible':'hidden';
    document.querySelector('.br-choose').style.visibility=d.path?'visible':'hidden';
    var list=document.getElementById('brList');
    if(!brDirs.length){list.innerHTML='<div class="empty" style="padding:12px">Нет вложенных папок</div>';return}
    list.innerHTML=brDirs.map(function(x,i){return '<div class="br-item" data-i="'+i+'"><span class="br-ic">📁</span><span>'+esc(x.name)+'</span></div>'}).join('');
  }).catch(function(){});
}
document.getElementById('brList').addEventListener('click',function(e){
  var el=e.target.closest?e.target.closest('.br-item'):null;
  if(!el)return;var i=+el.getAttribute('data-i');if(brDirs[i])brGo(brDirs[i].path);
});
function cancelJob(id){if(confirm('Отменить эту загрузку?')){post('/api/cancel?id='+encodeURIComponent(id)).then(tick)}}
function fmtDate(u){if(!u)return 'ещё не был на связи';var d=new Date(u*1000);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
function fmtSize(mib){if(mib>=1024)return (mib/1024).toFixed(1)+' ГиБ';return mib+' МиБ'}
var devEditing=null; // pub устройства, чьё имя сейчас редактируется
function renderDevs(devs){
  var box=document.getElementById('devs');
  if(devEditing!==null)return; // не перерисовывать под руками у пользователя
  if(!devs||!devs.length){box.innerHTML='<div class="empty">Пока никто не подключён</div>';return}
  box.innerHTML=devs.map(function(d,i){
    return '<div class="dl" style="display:flex;align-items:center;gap:10px;margin:6px 0">'+
      '<span class="dl-name dev-name" data-i="'+i+'" title="Нажмите, чтобы переименовать" style="cursor:pointer;margin:0">'+esc(d.name)+' ✎</span>'+
      '<span class="meta" style="margin:0 0 0 auto">'+fmtDate(d.last_seen)+'</span>'+
      '<button class="jb dev-del" data-i="'+i+'">Отключить</button></div>';
  }).join('');
  box._devs=devs;
}
document.getElementById('devs').addEventListener('click',function(e){
  var devs=document.getElementById('devs')._devs||[];
  var del=e.target.closest&&e.target.closest('.dev-del');
  if(del){var d=devs[+del.getAttribute('data-i')];
    if(d&&confirm('Отключить «'+d.name+'»? Этот ТВ больше не сможет присылать загрузки.')){
      post('/api/device/revoke?pub='+encodeURIComponent(d.pub)).then(tick)}
    return}
  var nm=e.target.closest&&e.target.closest('.dev-name');
  if(nm){var d2=devs[+nm.getAttribute('data-i')];if(!d2)return;
    devEditing=d2.pub;
    var inp=document.createElement('input');
    inp.value=d2.name;inp.className='path';inp.style.fontSize='14px';inp.maxLength=40;
    nm.replaceWith(inp);inp.focus();inp.select();
    function done(save){
      devEditing=null;
      if(save&&inp.value.trim()&&inp.value.trim()!==d2.name){
        post('/api/device/rename?pub='+encodeURIComponent(d2.pub)+'&name='+encodeURIComponent(inp.value.trim())).then(tick)
      } else tick();
    }
    inp.addEventListener('keydown',function(ev){if(ev.key==='Enter'){ev.preventDefault();done(true)}if(ev.key==='Escape')done(false)});
    inp.addEventListener('blur',function(){done(true)});
  }
});
function resetKey(){
  if(confirm('Сбросить ключ? Появится новый код, ВСЕ подключённые ТВ будут отключены — их придётся подключать заново.')){
    post('/api/resetkey').then(tick)
  }
}
function renderHist(hist){
  var box=document.getElementById('hist');
  document.getElementById('histN').textContent=(hist&&hist.length)?'('+hist.length+')':'';
  if(!hist||!hist.length){box.innerHTML='<div class="empty">Завершённых загрузок пока нет</div>';return}
  box.innerHTML=hist.map(function(h){
    return '<div class="dl"><div class="dl-name">'+esc(h.name||'Загрузка')+'</div>'+
      '<div class="meta">'+fmtSize(h.mib||0)+' · '+esc(h.dir||'')+' · '+fmtDate(h.done)+'</div></div>';
  }).join('');
}
function clearHist(){if(confirm('Очистить историю? Файлы на диске останутся.')){post('/api/history/clear').then(tick)}}
function openPair(){post('/api/pairmode').then(tick)}
function settingsOpen(){document.getElementById('settings').classList.add('show')}
function settingsClose(){document.getElementById('settings').classList.remove('show')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')settingsClose()});
function quit(){if(confirm('Закрыть Lampa Downloader? Загрузки остановятся.')){post('/api/quit');document.body.innerHTML='<p style=\"color:#8f8f8f;padding:20px\">Агент остановлен. Можно закрыть окно.</p>'}}
function tick(){
  fetch('/api/state').then(r=>r.json()).then(d=>{
    var code=document.getElementById('code');code.innerHTML='';
    (d.code||'').split(' ').join('').split('').forEach(function(c){var s=document.createElement('span');s.textContent=c;code.appendChild(s)});
    var ps=document.getElementById('pairState'),pb2=document.getElementById('pairBtn');
    if(d.pair_sec>0){
      var mm=Math.floor(d.pair_sec/60),ss=d.pair_sec%60;
      ps.textContent='подключение открыто ещё '+mm+':'+(ss<10?'0':'')+ss+' (мест: '+(d.pair_left||0)+')';
      ps.style.color='#4a9e4a';pb2.textContent='Продлить';
    } else {
      ps.textContent='подключение новых ТВ закрыто';
      ps.style.color='';pb2.textContent='Разрешить подключение';
    }
    var di=document.getElementById('dir');if(document.activeElement!==di){di.value=d.dir||'';dirSaved=d.dir||'';}
    document.getElementById('dot').className='dot'+(d.relay?' on':'');
    document.getElementById('relay').textContent=d.relay?'на связи':'нет связи';
    if(d.version)document.getElementById('ver').textContent='Lampa Downloader '+d.version;
    renderDevs(d.devices);
    renderHist(d.history);
    var box=document.getElementById('jobs');
    if(!d.jobs||!d.jobs.length){box.innerHTML='<div class="empty">Пока пусто</div>';return}
    box.innerHTML=d.jobs.map(function(j){
      var pct=Math.max(0,Math.min(100,j.pct||0));
      var err=(j.state==='error');
      var bits;
      if(err){ bits=[j.err||'ошибка']; }
      else {
        bits=[stateRu(j.state), pct+'%', (j.done_mib||0)+'/'+(j.total_mib||0)+' МиБ'];
        var sp=fmtSpeed(j.speed); if(sp) bits.push(sp);
        var eta=fmtEta(j.eta); if(eta && !j.paused) bits.push('осталось '+eta);
        if(j.peers||j.seeds) bits.push('пиры '+(j.peers||0)+' · сиды '+(j.seeds||0));
      }
      var pb=j.paused
        ? '<button class="jb" data-act="resume" data-id="'+esc(j.id)+'">▶</button>'
        : '<button class="jb" data-act="pause"  data-id="'+esc(j.id)+'">❚❚</button>';
      var done=(j.state==='done'||j.state==='seeding'||err);
      var xbtn=done
        ? '<button class="jb" data-act="cancel" data-done="1" data-id="'+esc(j.id)+'">Убрать</button>'
        : '<button class="jb" data-act="cancel" data-id="'+esc(j.id)+'">✕</button>';
      return '<div class="dl"><div class="dl-name">'+esc(j.name||('Загрузка '+j.id))+
        '<span style="float:right">'+(done?'':pb)+xbtn+'</span></div>'+
        '<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div>'+
        '<div class="meta"'+(err?' style="color:#e05a5a;opacity:1"':'')+'>'+bits.join(' · ')+'</div></div>';
    }).join('');
  }).catch(function(){});
}
document.getElementById('jobs').addEventListener('click',function(e){
  var b=e.target.closest&&e.target.closest('button.jb'); if(!b)return;
  var id=b.getAttribute('data-id'), act=b.getAttribute('data-act');
  if(act==='pause')  pauseJob(id);
  else if(act==='resume') resumeJob(id);
  else if(act==='cancel'){
    var msg=b.getAttribute('data-done')
      ? 'Убрать из списка? Файлы на диске останутся.'
      : 'Отменить эту загрузку?';
    if(confirm(msg)) post('/api/cancel?id='+encodeURIComponent(id)).then(tick);
  }
});
function loadSettings(){
  post('/api/settings').then(r=>r.json()).then(function(s){
    document.getElementById('st_seed').checked=!!s.keep_seeding;
    document.getElementById('st_auto').checked=!!s.autostart;
    document.getElementById('st_part').checked=!!s.keep_files;
  }).catch(function(){});
}
function saveSetting(k,v){post('/api/settings?'+k+'='+(v?'1':'0')).catch(function(){})}
document.getElementById('st_seed').addEventListener('change',function(e){saveSetting('keep_seeding',e.target.checked)});
document.getElementById('st_auto').addEventListener('change',function(e){saveSetting('autostart',e.target.checked)});
document.getElementById('st_part').addEventListener('change',function(e){saveSetting('keep_files',e.target.checked)});
(function(){
  var el=document.getElementById('dir');
  el.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); saveDir(); el.blur(); } });
  el.addEventListener('blur',saveDir);
})();
loadSettings();
tick();setInterval(tick,1500);
</script>

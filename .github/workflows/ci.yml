me: ci
 
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'   # свежий патч Go: закрывает CVE в crypto/x509, tls, textproto
          cache: false           # go.sum в репо нет — кэш всё равно не работает
 
      - run: go mod tidy
 
      - name: Vet
        run: go vet ./...
 
      - name: Tests (race detector)
        run: go test -race ./...
 
      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

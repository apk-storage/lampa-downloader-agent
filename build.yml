name: build-agent

on:
  push:
    paths:
      - '**.go'
      - 'go.mod'
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ---- desktop binaries + GitHub Release ----
  binaries:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Resolve dependencies
        run: go mod tidy

      - name: Version string
        id: ver
        run: echo "v=$(date +%Y.%m.%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build Windows (native webview, CGO)
        env: { GOOS: windows, GOARCH: amd64, CGO_ENABLED: '1' }
        run: |
          go build -ldflags "-H=windowsgui -X main.version=${{ steps.ver.outputs.v }}" -o lampa-agent.exe .
          go build -ldflags "-X main.version=${{ steps.ver.outputs.v }}" -o lampa-agent-console.exe .

      - name: Build macOS + Linux (cross, no CGO)
        env: { LDF: "-X main.version=${{ steps.ver.outputs.v }}" }
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDF" -o lampa-agent-macos-intel .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDF" -o lampa-agent-macos-arm .
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "$LDF" -o lampa-agent-linux .

      - name: Publish "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest \
            --title "Lampa Downloader agent" \
            --notes "Автосборка. Windows: lampa-agent.exe (фоновый) или lampa-agent-console.exe (с логами)." \
            lampa-agent.exe lampa-agent-console.exe \
            lampa-agent-macos-intel lampa-agent-macos-arm lampa-agent-linux

  # ---- Docker image for NAS -> GitHub Container Registry ----
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Tests (race detector)
        run: go test -race ./...

      # Известные уязвимости зависимостей: показываем, но не валим сборку.
      # GO-2026-4479 (pion/dtls) не имеет исправления и приходит транзитивно из
      # anacrolix/torrent — затрагивает только WebRTC-пиров, которых мы не используем.
      - name: Vulnerability check (informational)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

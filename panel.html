<style>
:root{--bg:#1b1b1b;--card:#242424;--soft:#2e2e2e;--line:#333;--text:#f2f2f2;--muted:#8f8f8f;--ok:#5aa15a;--fill:#e8e8e8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:28px;max-width:640px;margin:0 auto}
.top{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.top h1{font-size:18px;font-weight:600;margin:0}
.dot{width:9px;height:9px;border-radius:50%;background:#666}
.dot.on{background:var(--ok)}
.muted{color:var(--muted)}
.card{background:var(--card);border:.5px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
.label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.code{display:flex;gap:8px}
.code span{font-family:ui-monospace,Consolas,monospace;font-size:30px;font-weight:600;background:var(--soft);border-radius:8px;padding:6px 14px;letter-spacing:.05em}
.dir{display:flex;align-items:center;gap:10px;margin-top:6px}
.dir .path{font-family:ui-monospace,Consolas,monospace;font-size:13px;flex:1;min-width:0;background:var(--soft);color:var(--text);padding:8px 10px;border-radius:8px;border:.5px solid var(--line);outline:none}
button{background:var(--soft);color:var(--text);border:.5px solid var(--line);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
button:hover{background:#383838}
.dl{margin:14px 0}
.dl-name{font-size:14px;margin-bottom:6px}
.bar{height:8px;border-radius:4px;background:var(--soft);overflow:hidden}
.fill{height:100%;background:var(--fill);border-radius:4px;transition:width .4s}
.meta{font-size:12px;color:var(--muted);margin-top:5px}
.empty{color:var(--muted);font-size:14px;padding:6px 0}
.jb{padding:2px 8px;font-size:12px;margin-left:6px}
.dirmsg{font-size:12px;margin-top:8px;min-height:16px;opacity:0;transition:opacity .2s}
.dirmsg.show{opacity:1}
.dirmsg.ok{color:#5aa15a}
.dirmsg.err{color:#e05a5a}
.sw{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;cursor:pointer}
.sw input{width:16px;height:16px;accent-color:#2b7cff;cursor:pointer}
#browser{display:none;margin-top:12px;border-top:.5px solid var(--line);padding-top:12px}
.br-top{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.br-path{flex:1;min-width:0;font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-choose{background:#2b7cff!important;border-color:#2b7cff!important;color:#fff!important}
#brList{max-height:240px;overflow:auto;border:.5px solid var(--line);border-radius:8px}
.br-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:.5px solid rgba(255,255,255,.05)}
.br-item:hover{background:var(--soft)}
.br-item:last-child{border-bottom:none}
.br-ic{opacity:.7}
</style></head><body>
<div class="top"><span class="dot" id="dot"></span><h1>Lampa Downloader</h1><span class="muted" id="relay" style="margin-left:auto;font-size:13px"></span><button onclick="quit()" style="margin-left:14px">Выход</button></div>

<div class="card">
  <div class="label">Код для Лампы</div>
  <div class="code" id="code"></div>
  <div class="muted" style="margin-top:10px;font-size:13px">Введите этот код в Лампе: Настройки → Lampa Downloader → Подключить ПК</div>
</div>

<div class="card">
  <div class="label">Папка загрузок</div>
  <div class="dir"><input class="path" id="dir" spellcheck="false" placeholder="Путь к папке загрузок"><button onclick="brOpen()">Обзор</button><button onclick="openDir()">Открыть</button></div>
  <div id="dirmsg" class="dirmsg"></div>
  <div id="browser">
    <div class="br-top"><button onclick="brUp()" id="brUpBtn">⬆</button><div class="br-path" id="brPath"></div><button class="br-choose" onclick="brChoose()">Выбрать эту папку</button><button onclick="brClose()">✕</button></div>
    <div id="brList"></div>
  </div>
</div>

<div class="card">
  <div class="label">Настройки</div>
  <label class="sw"><input type="checkbox" id="st_seed"><span>Раздавать после скачивания</span></label>
  <label class="sw"><input type="checkbox" id="st_auto"><span>Запускать вместе с системой</span></label>
  <label class="sw"><input type="checkbox" id="st_part"><span>Удалять недокачанные файлы при отмене</span></label>
</div>

<div class="card">
  <div class="label">Загрузки</div>
  <div id="jobs"><div class="empty">Пока пусто</div></div>
</div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML}
function stateRu(s){return s==='done'?'готово':s==='seeding'?'раздаётся':s==='connecting'?'подключение':s==='paused'?'пауза':'скачивание'}
function fmtSpeed(b){if(!b)return '';if(b>1048576)return (b/1048576).toFixed(1)+' МБ/с';if(b>1024)return Math.round(b/1024)+' КБ/с';return b+' Б/с'}
function fmtEta(s){if(s==null||s<0)return '';if(s<60)return s+' сек';if(s<3600)return Math.round(s/60)+' мин';var h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h+' ч '+m+' мин'}
function pauseJob(id){fetch('/api/pause?id='+encodeURIComponent(id)).then(tick)}
function resumeJob(id){fetch('/api/resume?id='+encodeURIComponent(id)).then(tick)}
function copyDiag(){fetch('/api/diag').then(r=>r.text()).then(function(t){navigator.clipboard.writeText(t).then(function(){alert('Диагностика скопирована в буфер обмена')},function(){prompt('Скопируйте диагностику:',t)})})}
function openDir(){fetch('/api/opendir')}
var dirSaved='';
function dirMsg(text,ok){
  var m=document.getElementById('dirmsg');
  m.textContent=text; m.className='dirmsg show '+(ok?'ok':'err');
  clearTimeout(m._t); m._t=setTimeout(function(){m.className='dirmsg'},2500);
}
function saveDir(){
  var el=document.getElementById('dir'), v=el.value.trim();
  if(!v || v===dirSaved) return;
  fetch('/api/setdir?dir='+encodeURIComponent(v)).then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d}})})
   .then(function(res){
      if(res.ok && res.d && res.d.dir){ el.value=res.d.dir; dirSaved=res.d.dir; dirMsg('Папка сохранена',true); }
      else { dirMsg((res.d&&res.d.error)||'Не удалось сохранить папку',false); }
   })
   .catch(function(){ dirMsg('Не удалось сохранить папку',false) });
}
var brState={path:'',parent:'',up:false},brDirs=[];
function brOpen(){var cur=document.getElementById('dir').value||'';document.getElementById('browser').style.display='block';brGo(cur)}
function brClose(){document.getElementById('browser').style.display='none'}
function brUp(){if(brState.up)brGo(brState.parent)}
function brChoose(){if(!brState.path)return;fetch('/api/setdir?dir='+encodeURIComponent(brState.path)).then(r=>r.json()).then(function(d){if(d&&d.dir){document.getElementById('dir').value=d.dir;dirSaved=d.dir;dirMsg('Папка сохранена',true);}brClose()}).catch(function(){dirMsg('Не удалось сохранить папку',false);brClose()})}
function brGo(path){
  fetch('/api/browse?path='+encodeURIComponent(path||'')).then(r=>r.json()).then(function(d){
    brState={path:d.path||'',parent:d.parent||'',up:!!d.up};
    brDirs=d.dirs||[];
    document.getElementById('brPath').textContent=d.path||'Компьютер';
    document.getElementById('brUpBtn').style.visibility=d.up?'visible':'hidden';
    document.querySelector('.br-choose').style.visibility=d.path?'visible':'hidden';
    var list=document.getElementById('brList');
    if(!brDirs.length){list.innerHTML='<div class="empty" style="padding:12px">Нет вложенных папок</div>';return}
    list.innerHTML=brDirs.map(function(x,i){return '<div class="br-item" data-i="'+i+'"><span class="br-ic">📁</span><span>'+esc(x.name)+'</span></div>'}).join('');
  }).catch(function(){});
}
document.getElementById('brList').addEventListener('click',function(e){
  var el=e.target.closest?e.target.closest('.br-item'):null;
  if(!el)return;var i=+el.getAttribute('data-i');if(brDirs[i])brGo(brDirs[i].path);
});
function cancelJob(id){if(confirm('Отменить эту загрузку?')){fetch('/api/cancel?id='+encodeURIComponent(id)).then(tick)}}
function quit(){if(confirm('Закрыть Lampa Downloader? Загрузки остановятся.')){fetch('/api/quit');document.body.innerHTML='<p style=\"color:#8f8f8f;padding:20px\">Агент остановлен. Можно закрыть окно.</p>'}}
function tick(){
  fetch('/api/state').then(r=>r.json()).then(d=>{
    var code=document.getElementById('code');code.innerHTML='';
    (d.code||'').split(' ').join('').split('').forEach(function(c){var s=document.createElement('span');s.textContent=c;code.appendChild(s)});
    var di=document.getElementById('dir');if(document.activeElement!==di){di.value=d.dir||'';dirSaved=d.dir||'';}
    document.getElementById('dot').className='dot'+(d.relay?' on':'');
    document.getElementById('relay').textContent=d.relay?'на связи':'нет связи';
    if(d.version)document.getElementById('ver').textContent='Lampa Downloader '+d.version;
    var box=document.getElementById('jobs');
    if(!d.jobs||!d.jobs.length){box.innerHTML='<div class="empty">Пока пусто</div>';return}
    box.innerHTML=d.jobs.map(function(j){
      var pct=Math.max(0,Math.min(100,j.pct||0));
      var bits=[stateRu(j.state), pct+'%', (j.done_mib||0)+'/'+(j.total_mib||0)+' МиБ'];
      var sp=fmtSpeed(j.speed); if(sp) bits.push(sp);
      var eta=fmtEta(j.eta); if(eta && !j.paused) bits.push('осталось '+eta);
      if(j.peers||j.seeds) bits.push('пиры '+(j.peers||0)+' · сиды '+(j.seeds||0));
      var pb=j.paused
        ? '<button class="jb" data-act="resume" data-id="'+esc(j.id)+'">▶</button>'
        : '<button class="jb" data-act="pause"  data-id="'+esc(j.id)+'">❚❚</button>';
      var done=(j.state==='done'||j.state==='seeding');
      return '<div class="dl"><div class="dl-name">'+esc(j.name||('Загрузка '+j.id))+
        '<span style="float:right">'+(done?'':pb)+'<button class="jb" data-act="cancel" data-id="'+esc(j.id)+'">✕</button></span></div>'+
        '<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div>'+
        '<div class="meta">'+bits.join(' · ')+'</div></div>';
    }).join('');
  }).catch(function(){});
}
document.getElementById('jobs').addEventListener('click',function(e){
  var b=e.target.closest&&e.target.closest('button.jb'); if(!b)return;
  var id=b.getAttribute('data-id'), act=b.getAttribute('data-act');
  if(act==='pause')  pauseJob(id);
  else if(act==='resume') resumeJob(id);
  else if(act==='cancel' && confirm('Отменить эту загрузку?')) fetch('/api/cancel?id='+encodeURIComponent(id)).then(tick);
});
function loadSettings(){
  fetch('/api/settings').then(r=>r.json()).then(function(s){
    document.getElementById('st_seed').checked=!!s.keep_seeding;
    document.getElementById('st_auto').checked=!!s.autostart;
    document.getElementById('st_part').checked=!!s.delete_part;
  }).catch(function(){});
}
function saveSetting(k,v){fetch('/api/settings?'+k+'='+(v?'1':'0')).catch(function(){})}
document.getElementById('st_seed').addEventListener('change',function(e){saveSetting('keep_seeding',e.target.checked)});
document.getElementById('st_auto').addEventListener('change',function(e){saveSetting('autostart',e.target.checked)});
document.getElementById('st_part').addEventListener('change',function(e){saveSetting('delete_part',e.target.checked)});
(function(){
  var el=document.getElementById('dir');
  el.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); saveDir(); el.blur(); } });
  el.addEventListener('blur',saveDir);
})();
loadSettings();
tick();setInterval(tick,1500);
</script>
<div style="text-align:center;margin-top:18px"><button onclick="copyDiag()" style="font-size:12px">Скопировать диагностику</button><div id="ver" style="color:var(--muted);font-size:11px;margin-top:10px;opacity:.7"></div></div></body></html>
